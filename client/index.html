<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Pinch-to-zoom must stay enabled — disabling it (maximum-scale=1) breaks
         WCAG 1.4.4 and prevents readers from zooming small body text. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>Story Mode — Your story. Your Guide.</title>
    <meta name="description" content="AI-driven interactive stories. Tell us who you are, your Guide builds the world, and the story unfolds one tap at a time." />

    <!-- Pastel cream matches the in-app background so the iOS status bar and
         Android browser chrome blend with the bookshelf when added to home screen. -->
    <meta name="theme-color" content="#FFF9F0" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph (Facebook, iMessage, Slack, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mystorymode.com/" />
    <meta property="og:title" content="Story Mode — Your story. Your Guide." />
    <meta property="og:description" content="AI-driven interactive stories. Tell us who you are, your Guide builds the world, and the story unfolds one tap at a time." />
    <meta property="og:image" content="https://mystorymode.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="The Story Mode Guide — a glowing pastel orb mascot — beside the wordmark Story Mode and the tagline 'Your story. Your Guide.'" />
    <meta property="og:site_name" content="Story Mode" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Story Mode — Your story. Your Guide." />
    <meta name="twitter:description" content="AI-driven interactive stories. Tell us who you are, your Guide builds the world, and the story unfolds one tap at a time." />
    <meta name="twitter:image" content="https://mystorymode.com/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
